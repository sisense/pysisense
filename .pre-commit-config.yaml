repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
      
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.27.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: pysisense-docstrings
        name: pysisense docstring conventions
        entry: uv run python tools/check_docstrings.py
        language: system
        types: [python]
        files: ^pysisense/.*\.py$
        pass_filenames: true