name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    outputs:
      released: ${{ steps.semantic.outputs.released }}
      version: ${{ steps.semantic.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python Semantic Release
        id: semantic
        uses: python-semantic-release/python-semantic-release@v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: "github-actions"
          git_committer_email: "github-actions@github.com"

      - name: Install build tools
        if: steps.semantic.outputs.released == 'true'
        run: pip install build

      - name: Build package
        if: steps.semantic.outputs.released == 'true'
        run: python -m build

      - name: Publish to PyPI
        if: steps.semantic.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

  bump-dev:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next dev version
        id: next
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          NEXT=$(python -c "v='$VERSION'; p=v.split('.'); p[-1]=str(int(p[-1])+1); print('.'.join(p)+'.dev0')")
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Update version files
        run: |
          NEXT="${{ steps.next.outputs.version }}"
          sed -i "s/^version = .*/version = \"$NEXT\"/" pyproject.toml
          sed -i "s/__version__ = .*/__version__ = \"$NEXT\"/" pysisense/__init__.py

      - name: Commit and push to dev
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pyproject.toml pysisense/__init__.py
          git commit -m "chore: bump dev version to ${{ steps.next.outputs.version }} [skip ci]"
          git push origin dev
